services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    command: >
      postgres
        -c shared_preload_libraries=pg_stat_statements
        -c pg_stat_statements.track=all
        -c max_connections=100
        -c wal_level=replica
        -c archive_mode=on
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1g

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  pgbouncer:
    image: edoburu/pgbouncer:v1.24.1-p1
    restart: unless-stopped
    environment:
      DATABASE_URL:       "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      POOL_MODE:          transaction
      MAX_CLIENT_CONN:    500
      DEFAULT_POOL_SIZE:  25
      SERVER_RESET_QUERY: "DISCARD ALL"
      SERVER_TLS_SSLMODE: disable
    depends_on:
      postgres:
        condition: service_healthy

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

  broker:
    image: ${BROKER_IMAGE:-aegis:latest}
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL:     postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB}
      REDIS_URL:        redis://redis:6379
      AUTH_PATH:        /config/auth.json
    volumes:
      - ./config:/config:ro
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./config/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      AEGIS_DOMAIN: ${AEGIS_DOMAIN}
      TLS_EMAIL:    ${TLS_EMAIL}
    depends_on:
      broker:
        condition: service_healthy

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      PGPASSWORD:         ${POSTGRES_PASSWORD}
      POSTGRES_USER:      ${POSTGRES_USER}
      POSTGRES_DB:        ${POSTGRES_DB}
      BACKUP_RETAIN_DAYS: ${BACKUP_RETAIN_DAYS:-30}
    entrypoint: |
      sh -c '
        echo "Backup service started. Running every 24h."
        while true; do
          STAMP=$$(date +%Y%m%d_%H%M%S)
          FILE="/backup/aegis_$${STAMP}.sql.gz"
          echo "[backup] Starting dump at $$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          pg_dump -h postgres -U $${POSTGRES_USER} $${POSTGRES_DB} | gzip > "$${FILE}"
          if [ $$? -eq 0 ]; then
            echo "[backup] Dump complete: $${FILE} ($$(du -sh $${FILE} | cut -f1))"
          else
            echo "[backup] ERROR: dump failed"
          fi
          find /backup -name "*.sql.gz" -mtime +$${BACKUP_RETAIN_DAYS} -delete
          sleep 86400
        done
      '
    volumes:
      - backup_data:/backup
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
  redis_data:
  caddy_data:
  caddy_config:
  backup_data:
