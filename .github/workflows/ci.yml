name: CI

on:
  push:
    branches: [main, "feature/**", "fix/**", "chore/**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check tests/

  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       aegis_test
          POSTGRES_USER:     broker
          POSTGRES_PASSWORD: changeme
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL:   postgresql://broker:changeme@localhost:5432/aegis_test
      ADMIN_PASSWORD: test-admin-pass
      SECRET_KEY:     test-secret-key-32-chars-xyzxyzxy
      AUTH_PATH:      config/auth.json
      REDIS_URL:      redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Create auth.json for tests
        run: cp config/auth.json.example config/auth.json

      - name: Run tests
        run: pytest tests/ -v --tb=short
