<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aegis — 404 Not Found</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:       #07090f;
    --surface-1:#0d1117;
    --border:   #1e2a3a;
    --text-1:   #e2e8f0;
    --text-2:   #94a3b8;
    --text-3:   #4a5568;
    --indigo:   #6366f1;
    --indigo-hi:#818cf8;
    --indigo-lo:#1e1f4a;
  }
  html, body {
    height: 100%; background: var(--bg);
    font-family: 'Fira Code', monospace; color: var(--text-1);
  }
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }

  .card {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 48px 40px;
    width: 420px;
    text-align: center;
  }

  .icon-wrap {
    width: 56px; height: 56px;
    background: var(--indigo-lo);
    border: 1px solid rgba(99,102,241,0.35);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
  }

  .code {
    font-size: 48px; font-weight: 700;
    color: var(--indigo-hi);
    letter-spacing: -0.04em;
    margin-bottom: 8px;
  }
  .title { font-size: 14px; font-weight: 600; color: var(--text-1); margin-bottom: 8px; }
  .sub   { font-size: 12px; color: var(--text-3); margin-bottom: 28px; line-height: 1.6; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 18px; border-radius: 6px;
    font-size: 12px; font-weight: 500;
    font-family: 'Fira Code', monospace;
    cursor: pointer; transition: all 0.15s;
    border: none; text-decoration: none;
  }
  .btn-primary { background: var(--indigo); color: #fff; }
  .btn-primary:hover { background: var(--indigo-hi); box-shadow: 0 0 12px rgba(99,102,241,0.35); }
  .btn-ghost { background: transparent; color: var(--text-2); border: 1px solid var(--border); margin-left: 8px; }
  .btn-ghost:hover { background: #1a2130; color: var(--text-1); }
</style>
</head>
<body>
<div class="card">
  <div class="icon-wrap">
    <svg width="24" height="24" fill="none" stroke="#818cf8" stroke-width="1.5" viewBox="0 0 24 24">
      <path d="M9.172 14.828 12 12m0 0 2.828-2.828M12 12 9.172 9.172M12 12l2.828 2.828M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
    </svg>
  </div>
  <div class="code">404</div>
  <div class="title">Page not found</div>
  <div class="sub">The resource you requested doesn't exist or you don't have permission to access it.</div>
  <div>
    <a href="javascript:history.back()" class="btn btn-ghost">← Go back</a>
    <a href="/login" class="btn btn-primary">Home</a>
  </div>
</div>
</body>
</html>
